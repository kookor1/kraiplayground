<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TikTok Authorization Callback</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #141b2d;
      --line: #2a3550;
      --text: #e8ecf7;
      --muted: #c7d2ea;
      --accent: #7dd3fc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, var(--bg) 100%);
      color: var(--text);
    }
    .card {
      width: min(760px, 100%);
      background: rgba(20, 27, 45, 0.94);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 32px 28px;
      box-shadow: 0 24px 72px rgba(0,0,0,.28);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 16px;
    }
    code {
      display: block;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      color: #dbeafe;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>TikTok authorization received</h1>
    <p>This page is used as the redirect URI for KR AI Playground during TikTok authorization.</p>
    <p>If you were redirected here after approving access, the callback completed and this window can be closed.</p>
    <code id="debug">Loading callback details...</code>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const entries = [...params.entries()];
    const output = entries.length
      ? entries.map(([k, v]) => `${k}=${v}`).join('\n')
      : 'No query parameters were found.';
    document.getElementById('debug').textContent = output;
  </script>
</body>
</html>
